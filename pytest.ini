[pytest]
# 注册自定义 mark，避免 pytest 警告 "Unknown mark: e2e"
markers =
    e2e: end-to-end tests that require real API keys and make real network calls (slow, costs money)

# 默认只显示失败的测试的输出，-v 时显示全部
log_cli = true
log_cli_level = WARNING

# asyncio 模式（pytest-asyncio 用）
asyncio_mode = auto

# 测试发现路径
testpaths = tests
